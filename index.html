
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Bilgehan Büyük Adam</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="top-bar">
    <div id="level-display">Seviye: <span id="lvl-text">1</span></div>
    <div id="moves-display" style="color: #e74c3c;">Hamle: <span id="moves-text">0</span></div>
    <div id="score-display">Puan: <span id="pts-text">0</span></div>
</div>

        
     <div class="bottom-bar">
            <button id="btn-leaderboard">🏆 Skorlar</button>
            <button id="btn-logout" style="border-color: #e67e22; color: #e67e22;">🚪 Çıkış</button>
            <button id="btn-auto-solve" class="desperate-btn" style="background: rgba(155, 89, 182, 0.2); border-color: #9b59b6; color: #9b59b6;">✨ Şişe Kapat</button>
            <button id="btn-help" class="desperate-btn">🔮 Ritüel</button>
        </div>
    </div>

    <div id="magic-ritual-screen" class="hidden">
        <h1 class="glow-text">BİLGEHAN BÜYÜK ADAM</h1>
        <p class="sub-text">Bunu içinden 3 defa söyle...</p>
    </div>
<div id="defeat-modal" class="hidden">
        <div class="modal-content">
            <h2 style="color: #e74c3c; margin-bottom: 10px;">HAMLELER BİTTİ!</h2>
            <p>Büyü yarım kaldı... Ne yapmak istersin?</p>
            
            <div class="modal-buttons">
                <button id="btn-buy-moves">100 Puan Ver (+5 Hamle)</button>
                <button id="btn-ritual-retry" class="desperate-btn">RİTÜEL YAP (+5 Hamle & Şişe)</button>
                <button id="btn-restart-level">Baştan Başla (Bedava)</button>
            </div>
        </div>
    </div>
    <div id="login-overlay">
        <div class="modal-content" style="max-width: 300px;">
            <h1 class="glow-text" style="font-size: 28px;">BÜYÜCÜ KİMLİĞİ</h1>
            <div class="auth-form">
                <input type="text" id="username-input" placeholder="Büyücü Adı (Örn: Merlin)" autocomplete="off">
                <input type="password" id="password-input" placeholder="Gizli Parola">
                <button id="btn-login" style="background-color: #2ecc71; color: white; border:none;">Giriş Yap</button>
                <button id="btn-register" class="desperate-btn">Yeni Kayıt Ol</button>
                <p id="auth-message" style="color: #e74c3c; margin-top: 10px; font-size: 14px; min-height: 20px;"></p>
            </div>
        </div>
    </div>
    <div id="start-overlay">
        <h1 class="glow-text">BİLGEHAN BÜYÜK ADAM</h1>
        <button id="btn-start">OYUNA BAŞLA</button>
    </div>
    <div id="leaderboard-modal" class="hidden" style="position: absolute; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index:250; display:flex; align-items:center; justify-content:center; flex-direction:column; pointer-events:auto;">
        <div class="modal-content" style="width: 350px;">
            <h2 style="color: #f1c40f; margin-bottom: 20px;">🏆 EN İYİ BÜYÜCÜLER</h2>
            <div id="leaderboard-list" style="text-align: left; margin-bottom: 20px; max-height: 300px; overflow-y: auto;">
                <p>Yükleniyor...</p>
            </div>
            <button id="btn-close-leaderboard" class="desperate-btn" style="width: 100%;">Tabloyu Kapat</button>
        </div>
    </div>
    <div id="win-text-overlay" class="hidden">
        <h1 class="victory-text">BÜYÜ TAMAM!</h1>
    </div>

    <div id="magic-smoke-transition" class="hidden"></div>

    <script src="js/audio.js"></script>
    <script src="js/api.js"></script>
    <script src="js/level.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
